const tscore=(t,type)=>type==="Pass"?-Math.abs(t):t;
const ptotal=(p,g)=>(g?.rounds||[]).reduce((s,r)=>{const t=parseInt(r.tricks[p]);return s+(isNaN(t)?0:tscore(t,r.type))},0);
const tricksOk=v=>v!==null&&v!==""&&v!==undefined&&!isNaN(parseInt(v));
const roundDone=(r,ps)=>!!r.type&&ps.every(p=>tricksOk(r.tricks[p]));
const countDone=g=>(g?.rounds||[]).filter(r=>roundDone(r,g.players)).length;
const gameDone=g=>countDone(g)===12;

// ── Players ───────────────────────────────────────────────────────────────────
function mkP(name){return{name,gamesPlayed:0,wins:0,positions:{1:0,2:0,3:0},byType:Object.fromEntries(GT.map(gt=>[gt,{asForhand:{rounds:0,totalTricks:0},asOther:{rounds:0,totalTricks:0}}]))}}
function fixP(pr){
  if(!pr.positions)pr.positions={1:0,2:0,3:0};
  GT.forEach(gt=>{if(!pr.byType[gt])pr.byType[gt]={asForhand:{rounds:0,totalTricks:0},asOther:{rounds:0,totalTricks:0}}});
  return pr;
}
function getP(name){if(!pdb[name])pdb[name]=mkP(name);return fixP(pdb[name])}

function getPositions(ps,fs){
  const sorted=[...ps].sort((a,b)=>fs[b]-fs[a]);
  const pos={};let p=1;
  for(let i=0;i<sorted.length;){
    let j=i;while(j<sorted.length&&fs[sorted[j]]===fs[sorted[i]])j++;
    for(let k=i;k<j;k++)pos[sorted[k]]=p;
    p=j+1;i=j;
  }
  return pos;
}

function computeStats(games){
  const db={};
  (games||[]).forEach(g=>{
    if(!g?.players||!g?.finalScores)return;
    const maxS=Math.max(...g.players.map(p=>+(g.finalScores[p]||0)));
    const positions=getPositions(g.players,g.finalScores);
    g.players.forEach(p=>{
      if(!db[p])db[p]=mkP(p);fixP(db[p]);
      db[p].gamesPlayed++;
      if(+(g.finalScores[p]||0)===maxS)db[p].wins++;
      const pos=positions[p];if(pos>=1&&pos<=3)db[p].positions[pos]++;
      (g.rounds||[]).forEach(r=>{
        if(!r.type)return;
        const tv=parseInt(r.tricks?.[p]);if(isNaN(tv))return;
        const key=r.forhand===p?"asForhand":"asOther";
        db[p].byType[r.type][key].rounds++;db[p].byType[r.type][key].totalTricks+=tv;
      });
    });
  });
  return db;
}

// ── Init ──────────────────────────────────────────────────────────────────────

  const ps=g.players;
  const done=g.rounds.filter(r=>roundDone(r,ps));
  if(done.length===0)return`<div style="text-align:center;padding:16px;font-size:13px;color:var(--t3)">Inga rundor klara ännu</div>`;
  const cum=Object.fromEntries(ps.map(p=>[p,[0]]));
  done.forEach(r=>ps.forEach(p=>{const last=cum[p][cum[p].length-1];const t=parseInt(r.tricks[p]);cum[p].push(last+(isNaN(t)?0:tscore(t,r.type)))}));
  const W=340,H=150,pL=30,pR=14,pT=12,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB;
  const allV=Object.values(cum).flat();
  let minY=Math.min(0,...allV),maxY=Math.max(0,...allV);
  if(minY===maxY){minY-=5;maxY+=5}
  const yR=maxY-minY;
  const xP=i=>pL+(i/12)*cW;
  const yP=v=>pT+cH-((v-minY)/yR)*cH;
  // y-axis ticks
  const step=yR>60?20:yR>30?10:yR>15?5:2;
  const t0=Math.ceil(minY/step)*step;
  const ticks=[];for(let v=t0;v<=maxY;v+=step)ticks.push(v);
  const gridSVG=ticks.map(v=>{const y=yP(v);const zero=v===0;return`<line x1="${pL}" y1="${y.toFixed(1)}" x2="${W-pR}" y2="${y.toFixed(1)}" stroke="currentColor" opacity="${zero?.15:.06}" stroke-width="${zero?1:.5}"/>
<text x="${(pL-3).toFixed(0)}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="8.5" fill="currentColor" opacity=".4">${v}</text>`}).join('');
  const xLabels=Array.from({length:13},(_,i)=>i===0?'':`<text x="${xP(i).toFixed(1)}" y="${(H-pB+13).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="currentColor" opacity=".4">${i}</text>`).join('');
  const linesSVG=ps.map((p,pi)=>{const pts=cum[p];const d=pts.map((v,i)=>`${i===0?'M':'L'}${xP(i).toFixed(1)},${yP(v).toFixed(1)}`).join(' ');const last=pts[pts.length-1];const lx=xP(pts.length-1),ly=yP(last);return`<path d="${d}" fill="none" stroke="${PCOLS[pi]}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
${pts.map((v,i)=>i===0?'':`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="3" fill="${PCOLS[pi]}"/>`).join('')}
<text x="${(lx+4).toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="10" fill="${PCOLS[pi]}" font-weight="bold">${last>0?"+":""}${last}</text>`}).join('');
  const legend=ps.map((p,pi)=>`<div class="chart-legend-item"><div class="legend-dot" style="background:${PCOLS[pi]}"></div>${esc(p)}</div>`).join('');
  return`<div class="chart-card">
  <div class="chart-title">Poängutveckling omgång för omgång</div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${gridSVG}${xLabels}${linesSVG}</svg>
  <div class="chart-legend">${legend}</div>
</div>`;
}

// ── Analysis ──────────────────────────────────────────────────────────────────
function analyze(g){
  try{
    const ps=g.players,fs=g.finalScores;
    const maxS=Math.max(...ps.map(p=>+fs[p]));
    const winners=ps.filter(p=>+fs[p]===maxS);
    const rounds=g.rounds.filter(r=>roundDone(r,ps));
    const rWins=Object.fromEntries(ps.map(p=>[p,0]));
    rounds.forEach(r=>{const sc=ps.map(p=>({p,s:tscore(+r.tricks[p],r.type)}));const best=Math.max(...sc.map(x=>x.s));sc.filter(x=>x.s===best).forEach(x=>rWins[x.p]++)});
    const ownPts=Object.fromEntries(ps.map(p=>[p,0]));
    const othPts=Object.fromEntries(ps.map(p=>[p,0]));
    rounds.forEach(r=>ps.forEach(p=>{const s=tscore(+r.tricks[p],r.type);if(r.forhand===p)ownPts[p]+=s;else othPts[p]+=s}));
    const typeBest={};
    GT.forEach(gt=>{const gr=rounds.filter(r=>r.type===gt);if(!gr.length){typeBest[gt]=null;return}const avgs=ps.map(p=>({p,avg:gr.reduce((s,r)=>s+tscore(+r.tricks[p],gt),0)/gr.length}));const best=avgs.reduce((a,b)=>a.avg>=b.avg?a:b);typeBest[gt]={player:best.p,avg:best.avg.toFixed(1)}});
    const run=Object.fromEntries(ps.map(p=>[p,0]));
    let decisive=null,maxGain=-Infinity;
    rounds.forEach((r,ri)=>{ps.forEach(p=>run[p]+=tscore(+r.tricks[p],r.type));winners.forEach(w=>{const others=ps.filter(p=>p!==w);if(!others.length)return;const wS=tscore(+r.tricks[w],r.type);const oAvg=others.reduce((s,p)=>s+tscore(+r.tricks[p],r.type),0)/others.length;const gain=wS-oAvg;if(gain>maxGain){maxGain=gain;decisive={r,idx:ri+1,winner:w,gain:Math.round(gain*10)/10,wScore:wS,isPass:r.type==="Pass"}}})});
    return{ok:true,g,ps,fs,maxS,winners,rWins,ownPts,othPts,typeBest,decisive};
  }catch(e){console.error(e);return{ok:false,g,ps:g.players,fs:g.finalScores,maxS:Math.max(...g.players.map(p=>+g.finalScores[p])),winners:g.players.filter(p=>+g.finalScores[p]===Math.max(...g.players.map(q=>+g.finalScores[q])))}}
}

// ── Shared summary renderer ───────────────────────────────────────────────────
function rSummaryContent(a){
  if(!a.ok){return`<div class="win-banner"><span class="win-crown">🏆</span><div class="win-lbl">${a.winners.length>1?"Oavgjort":"Vinnare"}</div><div class="win-name">${a.winners.map(esc).join(" &amp; ")}</div></div>`}
  const{g,ps,fs,maxS,winners,rWins,ownPts,typeBest,decisive}=a;
  const sorted=[...ps].sort((x,y)=>fs[y]-fs[x]);
  const maxRW=Math.max(...ps.map(p=>rWins[p]),1);
  const maxO=Math.max(...ps.map(p=>ownPts[p]));
  const minO=Math.min(...ps.map(p=>ownPts[p]));
  const bestO=ps.reduce((a,b)=>ownPts[a]>=ownPts[b]?a:b);
  const worstO=ps.reduce((a,b)=>ownPts[a]<=ownPts[b]?a:b);
  let decHTML="";
  if(decisive){const body=decisive.isPass?`Omgång <strong>${decisive.idx}</strong> – <strong>${esc(decisive.r.forhand)}</strong> valde <strong>Pass</strong>. ${esc(decisive.winner)} tog bara ${decisive.r.tricks[decisive.winner]} stick (${fmt(decisive.wScore)} p).`:`Omgång <strong>${decisive.idx}</strong> – <strong>${esc(decisive.r.forhand)}</strong> spelade <strong>${decisive.r.type}</strong>. ${esc(decisive.winner)} tog ${decisive.r.tricks[decisive.winner]} stick (${fmt(decisive.wScore)} p), ca <strong>${fmt(Math.round(decisive.gain))} p</strong> bättre än snittet.`;decHTML=`<div class="dec-card${decisive.isPass?" pass":""}"><div class="dec-ttl">${decisive.isPass?"🎯 Nyckelpassning":"⚡ Avgörande omgång"}</div><div class="dec-body">${body}</div></div>`}
  return`
  <div class="win-banner">
    <span class="win-crown">${winners.length>1?"🤝":"🏆"}</span>
    <div class="win-lbl">${winners.length>1?"Oavgjort":"Vinnare"}</div>
    <div class="win-name">${winners.map(esc).join(" &amp; ")}</div>
  </div>
  ${buildChart(g)}
  <div class="ins-card"><div class="ins-title">Slutresultat</div>
    ${sorted.map((p,i)=>`<div class="irow"><span class="iname">${["🥇","🥈","🥉"][i]||""} ${esc(p)}</span><span style="font-size:18px;font-weight:700" class="${scls(fs[p])}">${fmt(fs[p])} p</span></div>`).join("")}
  </div>
  <div class="ins-card"><div class="ins-title">Rundvinster</div>
    ${ps.map(p=>`<div class="irow"><span class="iname">${esc(p)}</span>
    <span style="display:flex;align-items:center;gap:8px"><span class="${rWins[p]===maxRW?"ibest":""}">${rWins[p]} av 12</span>
    <span class="bar-w"><span class="bar-f${rWins[p]===maxRW?" best":""}" style="width:${Math.round(rWins[p]/12*100)}%"></span></span></span></div>`).join("")}
  </div>
  <div class="ins-card"><div class="ins-title">Egna val – poäng som förhand</div>
    ${ps.map(p=>`<div class="irow"><span class="iname">${esc(p)}</span><span class="${ownPts[p]===maxO?"ibest":ownPts[p]===minO&&minO<maxO?"iworst":""}">${fmt(ownPts[p])} p</span></div>`).join("")}
    ${maxO-minO>=5?`<div class="hint">💡 <strong>${esc(bestO)}</strong> fick ut ${fmt(ownPts[bestO])} p på sina egna val – ${maxO-minO} p mer än <strong>${esc(worstO)}</strong>.</div>`:""}
  </div>
  <div class="ins-card"><div class="ins-title">Bäst per speltyp</div>
    ${GT.map(gt=>{const tb=typeBest[gt];if(!tb)return"";return`<div class="irow"><span><span class="gtb${gt==="Pass"?" pass":""}">${gt}</span></span><span><span class="ibest">${esc(tb.player)}</span><span class="sub">snitt ${tb.avg} stick</span></span></div>`}).join("")}
  </div>
  ${decHTML}`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=
    screen==="setup"  ?rSetup()  :screen==="game"   ?rGame()  :
    screen==="summary"?rSummary():screen==="history" ?rHist()  :
    screen==="detail" ?rDetail() :rStats();
  ["game","history","stats"].forEach(s=>{
    const el=document.getElementById("nb-"+s);
    if(el)el.className="nb"+((screen===s||(s==="game"&&(screen==="setup"||screen==="summary"))||(s==="history"&&screen==="detail"))?" active":"");
  });
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function rSetup(){
  const ex=Object.keys(pdb).sort();
  return`<div class="page"><div class="ph"><h1>Bismarck</h1></div>
  <div class="sec">Välj spelare (3 st)</div>
  ${[0,1,2].map(i=>`<div class="slot"><div class="slot-lbl">Spelare ${i+1}</div>
    <input type="text" id="pi${i}" value="${esc(spArr[i])}" placeholder="Skriv ett namn…" oninput="spArr[${i}]=this.value">
    ${ex.length?`<div class="chips">${ex.map(n=>`<div class="chip${spArr[i]===n?" active":""}" onclick="pickP(${i},'${esc(n)}')">${esc(n)}</div>`).join("")}</div>`:""}</div>`).join("")}
  <div class="btn btn-primary" onclick="startGame()">Starta spel</div>
  ${game?`<div class="btn btn-primary" style="background:var(--s2);color:var(--text);border:.5px solid var(--b2)" onclick="screen='game';render()">↩ Fortsätt pågående spel</div>`:""}
  </div>`;
}

// ── GAME ──────────────────────────────────────────────────────────────────────
function rGame(){
  if(!game){screen="setup";return rSetup()}
  const ps=game.players,tots=ps.map(p=>ptotal(p,game)),max=Math.max(...tots);
  const nd=countDone(game),done=nd===12;
  return`<div class="page">
  <div class="ph"><h2>Pågående spel</h2><div class="ha"><div class="btn btn-sm btn-ghost" onclick="showAbandon()">Avbryt</div></div></div>
  <div class="scards" style="grid-template-columns:repeat(3,1fr)">
    ${ps.map((p,i)=>{const t=tots[i],lead=t===max&&max!==0;return`<div class="scard${lead?" leader":""}">
      <div class="sc-n">${esc(p)}${lead?" ★":""}</div><div class="sc-t ${scls(t)}">${fmt(t)}</div>
      <div class="sc-pips">${GT.map(gt=>`<span class="pip${(game.usedTypes[p]||[]).includes(gt)?" used":""}">${gt.slice(0,3)}</span>`).join("")}</div>
    </div>`}).join("")}
  </div>
  ${buildChart(game)}
  <div class="prog-card">
    <div class="prog-row">
      <div class="prog-info">
        <div class="prog-title">${done?"✅ Alla rundor klara":nd+"/12 rundor ifyllda"}</div>
        <div class="prog-sub">${done?"Tryck Avsluta för att se statistik":"Fyll i speltyp och stick för varje runda"}</div>
      </div>
      <div class="btn btn-gold" onclick="doFinish()" style="${!done?"opacity:.35;pointer-events:none":""}">🏆 Avsluta</div>
    </div>
    ${!done?`<div class="prog-bar"><div class="prog-fill" style="width:${Math.round(nd/12*100)}%"></div></div>`:""}
  </div>
  <div class="sec">Rundor</div>
  ${game.rounds.map((r,ri)=>rRound(r,ri)).join("")}
  </div>`;
}

function rRound(r,ri){
  const ps=game.players,isPass=r.type==="Pass",comp=roundDone(r,ps);
  const avail=GT.filter(gt=>!(game.usedTypes[r.forhand]||[]).includes(gt)||gt===r.type);
  function drop(pi,name){
    if(pi===ps.length-1){const v=r.tricks[name];return`<div class="autov${isPass?" pass":""}${!tricksOk(v)?" dim":""}">${tricksOk(v)?+v:"—"}</div>`}
    const prevFilled=pi===0||ps.slice(0,pi).every(p=>tricksOk(r.tricks[p]));
    if(!prevFilled)return`<div class="autov dim">—</div>`;
    const prevSum=ps.slice(0,pi).reduce((s,p)=>{const t=parseInt(r.tricks[p]);return s+(isNaN(t)?0:t)},0);
    const maxT=TT-prevSum;const cur=parseInt(r.tricks[name]);const sel=(!isNaN(cur)&&cur>=0&&cur<=maxT)?cur:-1;
    return`<select class="trdrop${isPass?" pass":""}" onchange="setTricks(${ri},'${esc(name)}',this.value)"><option value="">—</option>${Array.from({length:maxT+1},(_,v)=>`<option value="${v}"${sel===v?" selected":""}>${v}</option>`).join("")}</select>`;
  }
  return`<div class="rcard${isPass?" pass-r":""}${comp?" done":""}">
  <div class="rh">
    <span class="rnum">${r.id}</span>
    <div class="fh-info"><span class="fh-name">${esc(r.forhand)}</span><span class="fh-lbl">förhand</span></div>
    <select class="tsel${isPass?" pass":""}" onchange="setType(${ri},this.value)"><option value="">Välj speltyp</option>${avail.map(gt=>`<option value="${gt}"${r.type===gt?" selected":""}>${gt}</option>`).join("")}</select>
    ${comp?`<span style="color:var(--green);font-size:16px">✓</span>`:""}
  </div>
  ${r.type?`<div class="tricks-row">${ps.map((p,pi)=>{const t=parseInt(r.tricks[p]);const pts=!isNaN(t)?tscore(t,r.type):null;return`<div class="tc${p===r.forhand?" fhcol":""}"><div class="tlbl">${esc(p)}</div>${drop(pi,p)}${pts!==null?`<div class="tpts ${scls(pts)}">${fmt(pts)} p</div>`:""}</div>`}).join("")}</div>`:""}
  </div>`;
}

// ── SUMMARY (post-game) ────────────────────────────────────────────────────────
let lastSummary=null;
function rSummary(){
  if(!lastSummary){screen="history";return rHist()}
  return`<div class="page">
  <div class="ph"><h2>Resultat</h2><div class="ha"><div class="btn btn-sm" onclick="screen='setup';spArr=['','',''];render()">Nytt spel</div></div></div>
  ${rSummaryContent(lastSummary)}
  <div class="btn btn-primary" onclick="navTo('history')">Se historik</div>
  </div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function rHist(){
  const list=[...hist].reverse();
  return`<div class="page">
  <div class="ph"><h2>Historik</h2><span style="font-size:13px;color:var(--t2)">${list.length} spel</span></div>

    ${g.players.map(p=>`<div class="hpl${g.finalScores[p]===mx?" winner":""}"><span>${esc(p)}</span><span class="${scls(g.finalScores[p])}">${fmt(g.finalScores[p])} p</span></div>`).join("")}

// ── DETAIL (history game detail) ──────────────────────────────────────────────
function rDetail(){
  if(!detailRec){screen="history";return rHist()}

  <div class="ph">
    <div><div style="font-size:11px;color:var(--t3);margin-bottom:2px">${detailRec.date}</div><h2>Speldetaljer</h2></div>
    <div class="btn btn-sm btn-ghost" onclick="screen='history';render()">← Tillbaka</div>
  </div>

}

// ── STATS ─────────────────────────────────────────────────────────────────────
function rStats(){
  const names=Object.keys(pdb).sort();
  const tabs=["overview",...names];
  if(!tabs.includes(statTab))statTab="overview";

  const tabHTML=`<div class="stabs">
    ${tabs.map(t=>`<div class="stab${t===statTab?" active":""}" onclick="statTab='${esc(t)}';render()">${t==="overview"?"Översikt":esc(t)}</div>`).join("")}
  </div>`;

  if(statTab==="overview")return`<div class="page"><div class="ph"><h2>Statistik</h2></div>${tabHTML}${rStatsOverview(names)}</div>`;
  const p=pdb[statTab];if(!p)return`<div class="page"><div class="ph"><h2>Statistik</h2></div>${tabHTML}</div>`;
  return`<div class="page"><div class="ph"><h2>Statistik</h2></div>${tabHTML}${rStatsPlayer(p)}</div>`;
}

function rStatsOverview(names){
  if(!names.length)return`<div class="empty">Avsluta ett spel för att se statistik.</div>`;
  const totalGames=hist.length;
  // Unique players across all games
  const allPlayers=new Set(hist.flatMap(g=>g.players));

  const rows=names.map(n=>{
    const p=fixP(pdb[n]);
    const wp=p.gamesPlayed>0?Math.round(p.wins/p.gamesPlayed*100):0;
    return{n,p,wp};
  }).sort((a,b)=>b.wp-a.wp||b.p.wins-a.p.wins);

  const best=rows[0];

  return`
  <div class="stat3">
    <div class="statc"><div class="stv">${totalGames}</div><div class="stl">Spel totalt</div></div>
    <div class="statc"><div class="stv">${allPlayers.size}</div><div class="stl">Spelare</div></div>
    <div class="statc"><div class="stv">${best?best.wp+"%":"-"}</div><div class="stl">Bäst vinstprocent</div></div>
  </div>
  ${best?`<div class="ins-card" style="margin-bottom:10px">
    <div class="ins-title">Ledartavla</div>
    <div class="irow" style="font-size:12px;color:var(--t2);padding-bottom:4px"><span>Spelare</span><span style="display:flex;gap:20px"><span>Spel</span><span>Vinst</span><span>V%</span><span>🥇</span><span>🥈</span><span>🥉</span></span></div>
    ${rows.map((r,i)=>{const p=r.p;return`<div class="irow${i===0?" ibest":""}">
      <span class="iname">${["🥇","🥈","🥉"][i]||"  "} ${esc(r.n)}</span>
      <span style="display:flex;gap:20px;font-size:13px">
        <span>${p.gamesPlayed}</span>
        <span>${p.wins}</span>
        <span class="${r.wp>=50?"ibest":""}">${r.wp}%</span>
        <span style="color:var(--gold)">${p.positions[1]||0}</span>
        <span style="color:var(--t2)">${p.positions[2]||0}</span>
        <span style="color:var(--t3)">${p.positions[3]||0}</span>
      </span>
    </div>`}).join("")}
  </div>`:""}
  <div class="ins-card">
    <div class="ins-title">Mest spelade speltyper (alla spel)</div>
    ${(()=>{const counts=Object.fromEntries(GT.map(gt=>[gt,0]));hist.forEach(g=>(g.rounds||[]).forEach(r=>{if(r.type)counts[r.type]++}));const max=Math.max(...Object.values(counts));return GT.map(gt=>`<div class="irow"><span><span class="gtb${gt==="Pass"?" pass":""}">${gt}</span></span><span style="display:flex;align-items:center;gap:8px"><span class="${counts[gt]===max?"ibest":""}">${counts[gt]} rundor</span><span class="bar-w"><span class="bar-f${counts[gt]===max?" best":""}" style="width:${max>0?Math.round(counts[gt]/max*100):0}%"></span></span></span></div>`).join("")})()}
  </div>`;
}

function rStatsPlayer(p){
  fixP(p);
  const wp=p.gamesPlayed>0?Math.round(p.wins/p.gamesPlayed*100):0;
  const tot=p.positions[1]+p.positions[2]+p.positions[3];
  return`
  <div class="stat4">
    <div class="statc"><div class="stv">${p.gamesPlayed}</div><div class="stl">Spelade</div></div>
    <div class="statc"><div class="stv">${p.wins}</div><div class="stl">Vinster</div></div>
    <div class="statc"><div class="stv">${wp}%</div><div class="stl">Vinstprocent</div></div>
    <div class="statc"><div class="stv">${hist.filter(g=>g.players.includes(p.name)).length}</div><div class="stl">Spel med</div></div>
  </div>
  <div class="ins-card">
    <div class="ins-title">Placeringar</div>
    ${[[1,"🥇",p.positions[1]||0],[2,"🥈",p.positions[2]||0],[3,"🥉",p.positions[3]||0]].map(([pos,medal,count])=>{const pct=tot>0?Math.round(count/tot*100):0;return`<div class="irow"><span class="iname">${medal} ${pos===1?"1:a":pos===2?"2:a":"3:e"} plats</span><span style="display:flex;align-items:center;gap:8px"><span>${count} ggr${tot>0?" ("+pct+"%)":""}</span><span class="bar-w"><span class="bar-f${pos===1?" best":""}" style="width:${pct}%"></span></span></span></div>`}).join("")}
  </div>
  <div class="sec">Snitt stick per speltyp</div>
  <div class="tblwrap"><table class="tbl">
    <thead><tr><th>Speltyp</th><th class="r">Som förhand</th><th class="r">Som annan</th></tr></thead>
    <tbody>${GT.map(gt=>{const d=p.byType[gt]||{asForhand:{rounds:0,totalTricks:0},asOther:{rounds:0,totalTricks:0}};const fa=d.asForhand.rounds>0?(d.asForhand.totalTricks/d.asForhand.rounds).toFixed(1):"—";const oa=d.asOther.rounds>0?(d.asOther.totalTricks/d.asOther.rounds).toFixed(1):"—";return`<tr><td><span class="gtb${gt==="Pass"?" pass":""}">${gt}</span></td><td class="r">${fa}<span class="sub">(${d.asForhand.rounds})</span></td><td class="r">${oa}<span class="sub">(${d.asOther.rounds})</span></td></tr>`}).join("")}</tbody>
  </table></div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function navTo(s){screen=s==="game"?(game?"game":"setup"):s;render()}
function pickP(i,name){spArr[i]=name;render()}
function openDetail(id){detailRec=hist.find(g=>g.id===id)||null;if(detailRec){screen="detail";render()}}

function startGame(){
  const names=[0,1,2].map(i=>(document.getElementById("pi"+i)?.value||spArr[i]||"").trim()||`Spelare ${i+1}`);
  if(new Set(names).size<3){showMsg("Spelarna måste ha unika namn.");return}
  names.forEach(n=>getP(n));game=newGame(names);store("bsk8_game",game);screen="game";render();
}
function setType(ri,type){
  const r=game.rounds[ri],old=r.type;
  if(old&&old!==type){const idx=(game.usedTypes[r.forhand]||[]).indexOf(old);if(idx>-1)game.usedTypes[r.forhand].splice(idx,1);game.players.forEach(p=>r.tricks[p]="")}
  r.type=type;
  if(type&&!(game.usedTypes[r.forhand]||[]).includes(type)){if(!game.usedTypes[r.forhand])game.usedTypes[r.forhand]=[];game.usedTypes[r.forhand].push(type)}
  store("bsk8_game",game);render();
}
function setTricks(ri,player,val){
  const r=game.rounds[ri],ps=game.players;
  r.tricks[player]=val===""?"":parseInt(val);
  const[p0,p1,p2]=ps;const t0=parseInt(r.tricks[p0]),t1=parseInt(r.tricks[p1]);
  if(player===p0&&!isNaN(t0)&&!isNaN(t1)&&t0+t1>TT){r.tricks[p1]="";r.tricks[p2]=""}
  if(ps.slice(0,-1).every(p=>tricksOk(r.tricks[p]))){
    const sum=ps.slice(0,-1).reduce((s,p)=>s+parseInt(r.tricks[p]),0);r.tricks[p2]=Math.max(0,TT-sum);
  }else{r.tricks[p2]=""}
  store("bsk8_game",game);render();
}

function doFinish(){
  const ps=game.players;
  const fs=Object.fromEntries(ps.map(p=>[p,ptotal(p,game)]));
  const maxS=Math.max(...Object.values(fs));
  const winners=ps.filter(p=>fs[p]===maxS);
  const positions=getPositions(ps,fs);
  const rec={id:Date.now(),date:new Date().toLocaleDateString("sv-SE"),players:ps,winner:winners.join(" & "),finalScores:fs,rounds:JSON.parse(JSON.stringify(game.rounds))};
  hist.push(rec);store("bsk8_hist",hist);
  ps.forEach(p=>{
    const pr=getP(p);pr.gamesPlayed++;
    if(fs[p]===maxS)pr.wins++;
    const pos=positions[p];if(pos>=1&&pos<=3)pr.positions[pos]++;
    game.rounds.forEach(r=>{if(!r.type)return;const tv=parseInt(r.tricks[p]);if(isNaN(tv))return;const key=r.forhand===p?"asForhand":"asOther";pr.byType[r.type][key].rounds++;pr.byType[r.type][key].totalTricks+=tv});
    pdb[p]=pr;
  });
  store("bsk8_pdb",pdb);
  lastSummary=analyze(rec);
  game=null;store("bsk8_game",null);screen="summary";render();
}

function showModal(html){document.getElementById("modal-root").innerHTML=`<div class="overlay" onclick="closeModal(event)">${html}</div>`}
function closeModal(e){if(e.target.classList.contains("overlay"))document.getElementById("modal-root").innerHTML=""}
function closeModalDirect(){document.getElementById("modal-root").innerHTML=""}
function showMsg(msg){showModal(`<div class="modal"><div class="modal-title">⚠️</div><div class="modal-sub">${esc(msg)}</div><div class="modal-btns"><div class="btn btn-primary" onclick="closeModalDirect()">OK</div></div></div>`)}
function showAbandon(){showModal(`<div class="modal"><div class="modal-title">Avbryt spel?</div><div class="modal-sub">Pågående spel sparas inte.</div><div class="modal-btns"><div class="btn btn-primary" style="background:var(--red);border-color:var(--red)" onclick="doAbandon()">Ja, avbryt</div><div class="btn btn-ghost" onclick="closeModalDirect()">Tillbaka</div></div></div>`)}
function doAbandon(){game=null;store("bsk8_game",null);spArr=["","",""];closeModalDirect();screen="setup";render()}
function clearHist(){showModal(`<div class="modal"><div class="modal-title">Rensa historik?</div><div class="modal-sub">All historik tas bort. Statistik påverkas inte.</div><div class="modal-btns"><div class="btn btn-primary" style="background:var(--red);border-color:var(--red)" onclick="doClearHist()">Rensa</div><div class="btn btn-ghost" onclick="closeModalDirect()">Avbryt</div></div></div>`)}
function doClearHist(){hist=[];store("bsk8_hist",hist);closeModalDirect();render()}

render();
</script>
